name: Deploy Theme to museuminamsterdam.nl

on:
  push:
    branches: [main]
    paths:
      - 'wp-content/themes/comedyadv/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        env:
          FTP_HOST: ${{ secrets.SSH_HOST }}
          FTP_USER: ${{ secrets.SSH_USERNAME }}
          FTP_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          [ -n "$FTP_HOST" ] || { echo "ERROR: SSH_HOST secret not set"; exit 1; }
          [ -n "$FTP_USER" ] || { echo "ERROR: SSH_USERNAME secret not set"; exit 1; }
          [ -n "$FTP_PASS" ] || { echo "ERROR: SSH_PASSWORD secret not set"; exit 1; }
          echo "OK — host: $FTP_HOST, user: $FTP_USER"

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy theme via FTP
        env:
          FTP_HOST: ${{ secrets.SSH_HOST }}
          FTP_USER: ${{ secrets.SSH_USERNAME }}
          FTP_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" ftps://$FTP_HOST << 'LFTP'
          set ftp:ssl-allow yes
          set ftp:ssl-force yes
          set ssl:verify-certificate no
          set net:timeout 60
          set net:max-retries 5
          set ftp:passive-mode yes

          echo "--- root listing ---"
          ls

          echo "--- deploying theme ---"
          mirror --reverse --delete --verbose \
            wp-content/themes/comedyadv \
            /customers/8/2/5/cvuyu2f87/webroots/sites/httpdocs/wp-content/themes/comedyadv

          echo "--- done ---"
          LFTP
