name: Deploy Theme to Hostnet
on:
  push:
    branches: [main]
    paths:
      - 'wp-content/themes/comedyadv/**'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_ed25519
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy via SFTP
        run: |
          sftp -i ~/.ssh/id_ed25519 -r ${{ vars.SSH_USERNAME }}@${{ vars.SSH_HOST }}:/customers/8/8/0/comedyadventure.nl/webroots/sites/comedyadventure.nl/wp-content/themes/comedyadv <<EOF
          put -r wp-content/themes/comedyadv
          EOF
