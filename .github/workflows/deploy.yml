name: Deploy Theme to Hostnet

on:
  push:
    branches: [main]
    paths:
      - 'wp-content/themes/comedyadv/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          [ -n "$SSH_HOST" ] || { echo "ERROR: SSH_HOST secret is not set"; exit 1; }
          [ -n "$SSH_USERNAME" ] || { echo "ERROR: SSH_USERNAME secret is not set"; exit 1; }
          [ -n "$SSH_PASSWORD" ] || { echo "ERROR: SSH_PASSWORD secret is not set"; exit 1; }
          echo "Secrets OK — connecting to: $SSH_HOST as $SSH_USERNAME"

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          lftp -u "$SSH_USERNAME","$SSH_PASSWORD" ftps://$SSH_HOST << 'EOF'
          set ftp:ssl-allow yes
          set ftp:ssl-force yes
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 3
          set ftp:passive-mode yes
          ls
          EOF
