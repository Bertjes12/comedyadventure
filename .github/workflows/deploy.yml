name: Deploy Theme to Hostnet

on:
  push:
    branches: [main]
    paths:
      - 'wp-content/themes/comedyadv/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u '$SSH_USERNAME','$SSH_PASSWORD' sftp://$SSH_HOST
            mirror -R wp-content/themes/comedyadv /customers/8/8/0/comedyadventure.nl/webroots/sites/comedyadventure.nl/wp-content/themes/comedyadv
            bye
          "
